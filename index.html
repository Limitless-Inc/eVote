<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Jinja College Electoral System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0b1120 0%, #19223a 100%);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .launcher-card {
            background: rgba(18, 26, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #2d3a5e;
            border-radius: 24px;
            padding: 48px 64px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: white;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1.1rem;
            border-bottom: 1px solid #2d3a5e;
            padding-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 48px;
            font-size: 1.2rem;
            font-weight: 500;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #1e2a47;
            color: #b0c4ff;
            border: 1px solid #3b4e7a;
            min-width: 180px;
        }

        .btn.admin {
            background: #1e3a5f;
            color: white;
            border-color: #4f7eb3;
            box-shadow: 0 8px 16px -4px rgba(30, 58, 95, 0.4);
        }

        .btn.student {
            background: #2a3f5e;
            color: white;
            border-color: #5b78a3;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .btn.admin:hover {
            background: #2b4b77;
            border-color: #6a9bd4;
        }

        .btn.student:hover {
            background: #3b5680;
            border-color: #7a97cc;
        }

        .footer-note {
            margin-top: 48px;
            color: #4b5b7a;
            font-size: 0.9rem;
        }

        /* App view (hidden initially) */
        .app-container {
            display: none;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0b1120;
        }
    </style>
</head>
<body>
    <div class="launcher-card" id="menu">
        <h1>Electoral Commission</h1>
        <div class="subtitle">Jinja College Admin Portal</div>

        <div class="button-group">
            <button class="btn admin" onclick="loadApp('admin')">Admin Access</button>
            <button class="btn student" onclick="loadApp('students')">Student Access</button>
        </div>

        <div class="footer-note">
            ⚡ Powered by Convergence Software 
        </div>
    </div>

    <div class="app-container" id="app">
        <iframe id="appFrame"></iframe>
    </div>

    <script>
        function loadApp(type) {
            const frame = document.getElementById('appFrame');
            const menu = document.getElementById('menu');
            const app = document.getElementById('app');

            if (type === 'admin') {
                frame.src = 'https://v0-jinja-college-electoral-system-2.vercel.app/admin';
            } else {
                frame.src = 'https://v0-jinja-college-electoral-system-2.vercel.app/admin/dashboard';
            }

            menu.style.display = 'none';
            app.style.display = 'block';
        }
    </script>
</body>

</html>
